<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spesial Buat Kimber 💜🌙</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:italic,wght@700&display=swap');

        :root {
            --primary-purple: #8B5CF6; /* Ungu cerah */
            --soft-purple: #F5F3FF;
            --dark-purple: #4C1D95; /* Ungu tua buat teks */
            --accent-pink: #EC4899; /* Pink gemes */
            --moon-yellow: #FFD700; /* Kuning bulan */
        }

        body {
            /* Background Langit Malam Estetik */
            background: linear-gradient(135deg, #2D1B69 0%, #1A0B3C 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden; /* Biar shooting stars ngga ngerusak scroll */
            position: relative;
        }

        /* --- Animasi Background (Bulan & Bintang) --- */
        .moon {
            position: absolute;
            top: 50px;
            right: 50px;
            font-size: 4rem;
            color: var(--moon-yellow);
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.7));
            animation: moonPulse 4s infinite ease-in-out;
            z-index: 0;
        }

        @keyframes moonPulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.9)); }
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: starTwinkle 2s infinite ease-in-out;
            z-index: 0;
        }

        @keyframes starTwinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        /* --- Kartu Utama (Glassmorphism Unyu) --- */
        .card {
            background: rgba(255, 255, 255, 0.1); /* Transparan */
            backdrop-filter: blur(15px); /* Efek blur */
            max-width: 550px;
            width: 100%;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 1; /* Di atas bintang */
            animation: cardSlideIn 1s ease-out;
        }

        @keyframes cardSlideIn {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Teks Judul (Tetap Teks Asli) */
        h1 {
            font-family: 'Plus Jakarta Sans', sans-serif; /* Ganti font biar lebih gemes */
            font-weight: 800;
            color: white; /* Putih biar kontras */
            font-size: 1.8rem;
            margin-bottom: 5px;
            line-height: 1.3;
            text-shadow: 0 2px 10px rgba(139, 92, 246, 0.5);
        }

        .subtitle {
            color: var(--accent-pink); /* Pink gemes */
            font-weight: 700;
            letter-spacing: 1.5px;
            margin-bottom: 30px;
            display: block;
            text-transform: uppercase;
        }

        /* --- Tombol Interaktif (More Colorful & Fun) --- */
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 18px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 800;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        /* Gradient & Shadow buat tombol */
        .btn-love {
            background: linear-gradient(45deg, var(--primary-purple), #A78BFA);
            color: white;
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
        }

        .btn-fun {
            background: linear-gradient(45deg, var(--accent-pink), #F472B6);
            color: white;
            box-shadow: 0 6px 20px rgba(236, 72, 153, 0.4);
        }

        /* Efek Hover Gemes */
        .btn:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.2);
        }

        .btn:active { transform: translateY(-2px); }

        /* --- Kotak Pesan (Pop-up Animation) --- */
        #message-display {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 25px;
            color: var(--dark-purple);
            font-weight: 600;
            font-size: 1.15rem;
            line-height: 1.7;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--soft-purple);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-top: 10px;
            transition: all 0.4s ease;
            position: relative;
        }

        /* Animasi pop-up pesan */
        #message-display.pop {
            animation: messagePop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes messagePop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Pesan Awal (Unchanged) */
        .initial-text {
            color: var(--primary-purple);
            font-style: italic;
        }

        /* --- Footer (Cute & Lowkey) --- */
        .footer {
            margin-top: 35px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 400;
        }

        .emoji-float {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
            animation: emojiFloat 3s infinite ease-in-out;
        }

        @keyframes emojiFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Responsive biar rapi di HP */
        @media (max-width: 500px) {
            .card { padding: 30px 20px; }
            h1 { font-size: 1.5rem; }
            .btn-grid { grid-template-columns: 1fr; }
            .moon { font-size: 3rem; top: 20px; right: 20px; }
        }
    </style>
</head>
<body>

    <div class="moon">🌙</div>
    <script>
        // Generate bintang-bintang random
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = Math.random() * 3 + 'px';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(star);
        }
    </script>

    <div class="card">
        <span class="emoji-float">🧸</span>
        <h1>Cepet sembuh yaa, semoga bisa mendingan tiap harinya</h1>
        <span class="subtitle">FOR KIMBER 💜</span>

        <div class="btn-grid">
            <button class="btn btn-love" onclick="generateMessage('support')">Semangat 🚀</button>
            <button class="btn btn-fun" onclick="generateMessage('happy')">Kayanya bikin malu bacanya hehe ✨</button>
        </div>

        <div id="message-display">
            <span class="initial-text">Klik dua tombol di atas yaaaaah</span>
        </div>

        <div class="footer">
            Dibuat dengan sepenuh hati biar kamu ngga stress
        </div>
    </div>

    <script>
        // --- Opsi Kalimat Baru (Supportive & Cute) ---
        // (Semua kalimat asli kamu ada di paling atas setiap list)
        const supportMessages = [
            // KALIMAT ASLI KAMU (Wajib ada)
            "Ingat ya, kamu sudah berusaha sejauh ini. Bangga banget sama kamu!",
            "Banyakin istirahat dulu yaaa kimber. Jangan lupa minum air putih yang banyak.",
            "Apapun hasilnya nanti, kamu tetap orang yang keren dan buat gue kagum.",
            "UTBK itu penting, tapi kesehatan kamu jauh lebih penting. Rehat yaaah!",
            "Jangan lupa makan ya, gue nggak tega liat kamu lemes.",
            
            // TAMBAHAN BARU (Supportive & Gak Awkward)
            "Ngga apa-apa istirahat sebentar, Kim. Lu juga butuh 'recharge'",
            "Inget, kamu ngga sendirian berjuangnya. Gue selalu support kamu dari sini, kalo butuh gue pasti ada!",
            "Tidur yang cukup yaaa, jangan begadang mulu. Kesehatan kamu itu prioritas!",
            "Ngga usah terlalu khawatir nanti gimana buat sekarang, fokus 'do your best' aja. Udah keren koo!",
        ];

        const happyMessages = [
            // KALIMAT ASLI KAMU (Wajib ada)
            "Kamu tiap hari dimanapun cantik banget (tiba tiba banget bilang gini, hehe).",
            "Makasih ya udah jadi orang paling random, paling seru, dan paling asik yang gue kenal sekarang ini.",
            "Semoga hari ini ada hal baik yang bikin kamu happy",
            "Jangan lupa bahagia hari ini, minimal senyum liat pesan ini ya!",
            "Kimber si paling kuat, si paling random, si paling tengil, dan si paling nyebelin tpi gue suka itu semua semangat terus ya!",

            // TAMBAHAN BARU (Fun & Gak Awkward)
            "Random banget ngga sih gue bikin ginian? Tapi ya gimana, siapa tau berguna.",
            "Kimber, ngga apa-apa kok kalau sesekali butuh ditemenin (belajar).",
        ];

        // --- Fungsi Confetti (More Colorful) ---
        function fireConfetti() {
            // Confetti Utama
            confetti({
                particleCount: 120,
                spread: 80,
                origin: { y: 0.6 },
                colors: ['#8B5CF6', '#EC4899', '#FFD700', '#ffffff'], // Ungu, Pink, Kuning, Putih
                disableForReducedMotion: true
            });
            // Confetti Kecil dari samping
            setTimeout(() => {
                confetti({
                    particleCount: 50,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#A78BFA', '#F472B6']
                });
                confetti({
                    particleCount: 50,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#A78BFA', '#F472B6']
                });
            }, 150);
        }

        // --- Fungsi Generate Pesan (With Animation) ---
        function generateMessage(type) {
            const display = document.getElementById('message-display');
            const messages = type === 'support' ? supportMessages : happyMessages;
            const randomMessage = messages[Math.floor(Math.random() * messages.length)];
            
            // Hapus class animasi lama (biar bisa pop ulang)
            display.classList.remove('pop');
            
            // Trigger reflow (trik buat restart animasi)
            void display.offsetWidth; 

            // Ganti teks & tambah class animasi
            display.innerText = randomMessage;
            display.classList.add('pop');
            
            // Nyalain confetti!
            fireConfetti();
        }
    </script>
</body>
</html>
